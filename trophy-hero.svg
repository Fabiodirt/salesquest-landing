<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @keyframes floatY {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-14px); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.25; }
      50% { opacity: 0.55; }
    }
    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0.4); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    @keyframes gemGlow {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; filter: drop-shadow(0 0 6px #c64ee3); }
    }
    .trophy-body { animation: floatY 4s ease-in-out infinite; transform-origin: 256px 300px; }
    .ring1 { animation: pulse 3s ease-in-out infinite; }
    .ring2 { animation: pulse 3s ease-in-out infinite 0.6s; }
    .sp1 { animation: sparkle 2s ease-in-out infinite 0s; transform-origin: 60px 80px; }
    .sp2 { animation: sparkle 2s ease-in-out infinite 0.5s; transform-origin: 450px 100px; }
    .sp3 { animation: sparkle 2s ease-in-out infinite 1s; transform-origin: 40px 350px; }
    .sp4 { animation: sparkle 2s ease-in-out infinite 1.5s; transform-origin: 460px 370px; }
    .sp5 { animation: sparkle 2s ease-in-out infinite 0.8s; transform-origin: 256px 30px; }
    .gem-center { animation: gemGlow 2.5s ease-in-out infinite; }
  </style>

  

  <circle class="ring1" cx="256" cy="280" r="200" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle class="ring2" cx="256" cy="280" r="160" fill="none" stroke="#a78bfa" stroke-width="1" stroke-opacity="0.3"/>

  <g class="sp1" fill="#fef3c7">
    <path d="M60 70 L63 80 L60 90 L57 80 Z"/>
    <path d="M50 80 L60 77 L70 80 L60 83 Z"/>
  </g>
  <g class="sp2" fill="#fef3c7">
    <path d="M450 90 L453 100 L450 110 L447 100 Z"/>
    <path d="M440 100 L450 97 L460 100 L450 103 Z"/>
  </g>
  <g class="sp3" fill="#a78bfa">
    <path d="M40 340 L43 350 L40 360 L37 350 Z"/>
    <path d="M30 350 L40 347 L50 350 L40 353 Z"/>
  </g>
  <g class="sp4" fill="#a78bfa">
